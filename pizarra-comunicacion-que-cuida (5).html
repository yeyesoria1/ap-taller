<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicación que Cuida — Taller 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0ede6;
    --muted: #888;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --accent: #a78bfa;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 32px;
  }
  .login-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    text-align: center;
    line-height: 1.1;
  }
  .login-title span { color: var(--accent); }
  .login-subtitle { color: var(--muted); font-size: 0.95rem; text-align: center; }

  .role-cards {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 480px;
  }
  .role-card {
    flex: 1;
    min-width: 140px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .role-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .role-card .icon { font-size: 2.2rem; margin-bottom: 10px; }
  .role-card .label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .role-card .desc { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .code-input-box {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .code-input-box label {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .code-input-box input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: 0.15em;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .code-input-box input:focus { border-color: var(--accent); }
  .btn {
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text); }
  .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; }

  /* APP HEADER */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    position: sticky; top: 0; z-index: 50;
  }
  .header-left { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; }
  .header-left span { color: var(--accent); }
  .badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .badge-fac { background: rgba(167,139,250,0.15); color: var(--accent); border: 1px solid rgba(167,139,250,0.3); }
  .badge-part { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }

  .main { flex: 1; padding: 20px; max-width: 700px; margin: 0 auto; width: 100%; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    margin-bottom: 6px;
  }
  .section-desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.5; }

  /* SEMÁFORO — PARTICIPANTE */
  .semaforo-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .semaforo-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
  }
  .semaforo-item .item-label {
    font-weight: 500;
    font-size: 1rem;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .semaforo-options {
    display: flex;
    gap: 10px;
  }
  .semaforo-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    background: var(--bg);
    color: var(--muted);
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .semaforo-btn .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    margin-bottom: 2px;
  }
  .semaforo-btn.verde .dot { background: var(--green); }
  .semaforo-btn.amarillo .dot { background: var(--yellow); }
  .semaforo-btn.rojo .dot { background: var(--red); }
  .semaforo-btn.selected-verde { border-color: var(--green); background: rgba(74,222,128,0.1); color: var(--green); }
  .semaforo-btn.selected-amarillo { border-color: var(--yellow); background: rgba(250,204,21,0.1); color: var(--yellow); }
  .semaforo-btn.selected-rojo { border-color: var(--red); background: rgba(248,113,113,0.1); color: var(--red); }

  .submit-area { margin-top: 28px; }
  .submit-area .btn { width: 100%; }
  .sent-msg {
    text-align: center;
    padding: 28px;
    background: var(--card);
    border-radius: 16px;
    border: 1px solid rgba(74,222,128,0.3);
  }
  .sent-msg .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .sent-msg p { color: var(--green); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .sent-msg small { color: var(--muted); font-size: 0.85rem; display: block; margin-top: 6px; }

  /* FACILITADORA — DASHBOARD */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1;
    min-width: 80px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-card .num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
  }
  .stat-card .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .stat-card.verde .num { color: var(--green); }
  .stat-card.amarillo .num { color: var(--yellow); }
  .stat-card.rojo .num { color: var(--red); }
  .stat-card.total .num { color: var(--accent); }

  /* RESULTADOS POR PREGUNTA */
  .results-list { display: flex; flex-direction: column; gap: 14px; }
  .result-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
  }
  .result-item .q-label {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 500;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 0.82rem;
  }
  .bar-row .color-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .bar-row .bar-label { width: 68px; flex-shrink: 0; }
  .bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .bar-fill.verde { background: var(--green); }
  .bar-fill.amarillo { background: var(--yellow); }
  .bar-fill.rojo { background: var(--red); }
  .bar-row .count { color: var(--muted); font-size: 0.8rem; min-width: 22px; text-align: right; }

  /* ALERT STATUS */
  .alert-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    color: var(--muted);
    padding: 10px 14px;
    background: rgba(248,113,113,0.06);
    border-radius: 10px;
    border: 1px solid rgba(248,113,113,0.15);
    margin-top: 8px;
  }
  .alert-item .dot-r { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
  }
  .btn-clear:hover { color: var(--red); border-color: var(--red); }

  .waiting-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .waiting-msg .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .connection-bar {
    font-size: 0.75rem;
    padding: 6px 14px;
    text-align: center;
    font-weight: 500;
  }
  .conn-ok { background: rgba(74,222,128,0.1); color: var(--green); }
  .conn-err { background: rgba(248,113,113,0.1); color: var(--red); }

  .tab-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--card);
    border-radius: 12px;
    padding: 6px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    background: transparent;
    color: var(--muted);
    transition: all 0.18s;
  }
  .tab-btn.active { background: var(--bg); color: var(--text); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div>
    <div class="login-title">Comunicación<br>que <span>Cuida</span></div>
    <p class="login-subtitle" style="margin-top:8px;">Taller 3 · El equipo somos nosotras</p>
  </div>

  <div class="role-cards" id="role-selector">
    <div class="role-card" onclick="selectRole('facilitadora')">
      <div class="icon">🎯</div>
      <div class="label">Facilitadora</div>
      <div class="desc">Panel de gestión</div>
    </div>
    <div class="role-card" onclick="selectRole('participante')">
      <div class="icon">🌿</div>
      <div class="label">Participante</div>
      <div class="desc">Ingresar con código</div>
    </div>
  </div>

  <div class="code-input-box hidden" id="code-box">
    <label id="code-label">Código de acceso</label>
    <input type="text" id="code-input" placeholder="••••••" autocomplete="off" maxlength="20"
      onkeydown="if(event.key==='Enter') submitCode()">
    <div class="error-msg hidden" id="error-msg">Código incorrecto. Intentá de nuevo.</div>
    <button class="btn btn-primary" onclick="submitCode()">Entrar</button>
    <button class="btn btn-secondary" onclick="backToRoles()">Volver</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="conn-bar" class="connection-bar conn-ok">● Conectada</div>
  <div class="header">
    <div class="header-left">Com. que <span>Cuida</span> · T3</div>
    <span class="badge" id="role-badge"></span>
  </div>
  <div class="main" id="main-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkLolpDbT5x8cARqRvb4OfSLQ_bGrqOEE",
  authDomain: "ap-taller.firebaseapp.com",
  databaseURL: "https://ap-taller-default-rtdb.firebaseio.com",
  projectId: "ap-taller",
  storageBucket: "ap-taller.firebasestorage.app",
  messagingSenderId: "457620868871",
  appId: "1:457620868871:web:9fd625c23356eef3993fa2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ——— CONFIG ———
const PASS_FAC = "AP2026";
const CODES_PART = ["VERDE", "AZUL", "ROJA", "AMARILLA", "NARANJA", "BLANCA", "VIOLETA", "ROSA"];

const PREGUNTAS = [
  { id: "q1", texto: "¿Cómo está la comunicación entre nosotras en el día a día?" },
  { id: "q2", texto: "¿Cómo nos organizamos cuando hay mucho trabajo o presión?" },
  { id: "q3", texto: "¿Cómo manejamos las diferencias de criterio entre nosotras?" },
  { id: "q4", texto: "¿Cómo es el ambiente de trabajo en general?" },
  { id: "q5", texto: "¿Cómo nos apoyamos cuando alguien tiene una situación difícil con un paciente?" },
  { id: "q6", texto: "¿Cómo está el momento del desayuno como espacio de equipo?" },
];

let currentRole = null;
let currentCode = null;
let responseRef = null;

// ——— CONNECTION STATUS ———
const connRef = ref(db, ".info/connected");
onValue(connRef, (snap) => {
  const bar = document.getElementById("conn-bar");
  if (snap.val() === true) {
    bar.textContent = "● Conectada";
    bar.className = "connection-bar conn-ok";
  } else {
    bar.textContent = "○ Sin conexión — revisá tu señal";
    bar.className = "connection-bar conn-err";
  }
});

// ——— ROLE SELECTION ———
window.selectRole = (role) => {
  currentRole = role;
  document.getElementById("role-selector").classList.add("hidden");
  const box = document.getElementById("code-box");
  box.classList.remove("hidden");
  document.getElementById("code-label").textContent =
    role === "facilitadora" ? "Contraseña de facilitadora" : "Tu código de color";
  document.getElementById("code-input").placeholder = role === "facilitadora" ? "Contraseña" : "Ej: VERDE";
  document.getElementById("code-input").focus();
};

window.backToRoles = () => {
  document.getElementById("code-box").classList.add("hidden");
  document.getElementById("role-selector").classList.remove("hidden");
  document.getElementById("error-msg").classList.add("hidden");
  document.getElementById("code-input").value = "";
};

window.submitCode = () => {
  const val = document.getElementById("code-input").value.trim().toUpperCase();
  const err = document.getElementById("error-msg");
  if (currentRole === "facilitadora") {
    if (val === PASS_FAC) { enterApp("facilitadora", "FAC"); }
    else { err.classList.remove("hidden"); }
  } else {
    if (CODES_PART.includes(val)) { enterApp("participante", val); }
    else { err.classList.remove("hidden"); }
  }
};

function enterApp(role, code) {
  currentRole = role;
  currentCode = code;
  document.getElementById("login-screen").style.display = "none";
  const appEl = document.getElementById("app");
  appEl.style.display = "flex";
  appEl.style.flexDirection = "column";
  document.getElementById("role-badge").textContent = role === "facilitadora" ? "Facilitadora" : code;
  document.getElementById("role-badge").className = "badge " + (role === "facilitadora" ? "badge-fac" : "badge-part");
  if (role === "facilitadora") renderFacilitadora();
  else renderParticipante(code);
}

// ——— PARTICIPANTE ———
function renderParticipante(code) {
  const main = document.getElementById("main-content");
  const key = "t3_respuestas/" + code;
  responseRef = ref(db, key);

  // Check if already responded
  get(responseRef).then(snap => {
    if (snap.exists()) {
      main.innerHTML = alreadySentHTML();
    } else {
      main.innerHTML = buildParticipanteForm(code);
    }
  }).catch(() => {
    main.innerHTML = buildParticipanteForm(code);
  });
}

function buildParticipanteForm(code) {
  let html = `
    <div class="section-title">Semáforo de equipo</div>
    <p class="section-desc">Para cada situación, marcá cómo la ves: <strong style="color:var(--green)">Verde</strong> (bien), <strong style="color:var(--yellow)">Amarillo</strong> (regular) o <strong style="color:var(--red)">Rojo</strong> (hay que mejorar).</p>
    <div class="semaforo-grid" id="form-grid">
  `;
  PREGUNTAS.forEach(q => {
    html += `
      <div class="semaforo-item" id="item-${q.id}">
        <div class="item-label">${q.texto}</div>
        <div class="semaforo-options">
          <button class="semaforo-btn verde" onclick="selectSemaforo('${q.id}','verde',this)">
            <div class="dot"></div>Verde
          </button>
          <button class="semaforo-btn amarillo" onclick="selectSemaforo('${q.id}','amarillo',this)">
            <div class="dot"></div>Amarillo
          </button>
          <button class="semaforo-btn rojo" onclick="selectSemaforo('${q.id}','rojo',this)">
            <div class="dot"></div>Rojo
          </button>
        </div>
      </div>
    `;
  });
  html += `</div>
    <div class="submit-area">
      <button class="btn btn-primary" onclick="submitRespuestas('${code}')">Enviar mi semáforo</button>
    </div>
  `;
  return html;
}

const selecciones = {};
window.selectSemaforo = (qid, color, btn) => {
  selecciones[qid] = color;
  const item = document.getElementById("item-" + qid);
  item.querySelectorAll(".semaforo-btn").forEach(b => {
    b.className = "semaforo-btn " + b.className.split(" ")[1];
  });
  btn.className = `semaforo-btn ${color} selected-${color}`;
};

window.submitRespuestas = (code) => {
  const unanswered = PREGUNTAS.filter(q => !selecciones[q.id]);
  if (unanswered.length > 0) {
    alert("Falta marcar " + unanswered.length + " pregunta(s) antes de enviar.");
    return;
  }
  const data = { codigo: code, timestamp: Date.now(), respuestas: selecciones };
  set(ref(db, "t3_respuestas/" + code), data)
    .then(() => {
      document.getElementById("main-content").innerHTML = alreadySentHTML();
    })
    .catch(err => {
      alert("Hubo un error al enviar. Verificá tu conexión e intentá de nuevo.");
      console.error(err);
    });
};

function alreadySentHTML() {
  return `
    <div class="sent-msg">
      <div class="icon">✅</div>
      <p>¡Tu semáforo fue enviado!</p>
      <small>Gracias por participar. La facilitadora está viendo los resultados.</small>
    </div>
  `;
}

// ——— FACILITADORA ———
function renderFacilitadora() {
  const main = document.getElementById("main-content");
  main.innerHTML = `
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-results" onclick="showTab('results')">Resultados</button>
      <button class="tab-btn" id="tab-detail" onclick="showTab('detail')">Por pregunta</button>
    </div>
    <div id="panel-results"></div>
    <div id="panel-detail" class="hidden"></div>
    <button class="btn-clear" onclick="clearData()">🗑 Limpiar respuestas (inicio de sesión)</button>
  `;
  listenData();
}

function showTab(tab) {
  document.getElementById("tab-results").className = "tab-btn" + (tab === "results" ? " active" : "");
  document.getElementById("tab-detail").className = "tab-btn" + (tab === "detail" ? " active" : "");
  document.getElementById("panel-results").className = tab === "results" ? "" : "hidden";
  document.getElementById("panel-detail").className = tab === "detail" ? "" : "hidden";
}
window.showTab = showTab;

function listenData() {
  onValue(ref(db, "t3_respuestas"), (snap) => {
    const data = snap.val() || {};
    const respuestas = Object.values(data);
    renderResultsPanel(respuestas);
    renderDetailPanel(respuestas);
  });
}

function renderResultsPanel(respuestas) {
  const panel = document.getElementById("panel-results");
  if (respuestas.length === 0) {
    panel.innerHTML = `<div class="waiting-msg"><div class="spinner"></div>Esperando respuestas de las participantes…</div>`;
    return;
  }

  // Count totals across all answers
  let totVerde = 0, totAmarillo = 0, totRojo = 0;
  respuestas.forEach(r => {
    Object.values(r.respuestas || {}).forEach(v => {
      if (v === "verde") totVerde++;
      else if (v === "amarillo") totAmarillo++;
      else if (v === "rojo") totRojo++;
    });
  });

  // Find red-flagged questions (majority rojo)
  const rojos = [];
  PREGUNTAS.forEach(q => {
    let v=0,a=0,r=0;
    respuestas.forEach(resp => {
      const val = resp.respuestas?.[q.id];
      if (val === "verde") v++;
      else if (val === "amarillo") a++;
      else if (val === "rojo") r++;
    });
    if (r > v && r > 0) rojos.push({ q, r });
  });

  let html = `
    <div class="section-title" style="margin-bottom:4px">Resumen del grupo</div>
    <p class="section-desc">${respuestas.length} participante${respuestas.length > 1 ? "s" : ""} respondieron</p>
    <div class="stats-row">
      <div class="stat-card total"><div class="num">${respuestas.length}</div><div class="lbl">Respuestas</div></div>
      <div class="stat-card verde"><div class="num">${totVerde}</div><div class="lbl">Verde</div></div>
      <div class="stat-card amarillo"><div class="num">${totAmarillo}</div><div class="lbl">Amarillo</div></div>
      <div class="stat-card rojo"><div class="num">${totRojo}</div><div class="lbl">Rojo</div></div>
    </div>
  `;

  if (rojos.length > 0) {
    html += `<div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:var(--red);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">⚠ Para trabajar en el grupo</div>`;
    rojos.forEach(({q, r}) => {
      html += `<div class="alert-item"><div class="dot-r"></div>${q.texto} <span style="margin-left:auto;color:var(--red);font-weight:600">${r}🔴</span></div>`;
    });
  }
  panel.innerHTML = html;
}

function renderDetailPanel(respuestas) {
  const panel = document.getElementById("panel-detail");
  if (respuestas.length === 0) {
    panel.innerHTML = `<div class="waiting-msg"><div class="spinner"></div>Sin datos todavía…</div>`;
    return;
  }
  let html = `<div class="results-list">`;
  PREGUNTAS.forEach(q => {
    let v=0,a=0,r=0;
    respuestas.forEach(resp => {
      const val = resp.respuestas?.[q.id];
      if (val === "verde") v++;
      else if (val === "amarillo") a++;
      else if (val === "rojo") r++;
    });
    const total = v+a+r || 1;
    html += `
      <div class="result-item">
        <div class="q-label">${q.texto}</div>
        <div class="bar-row"><div class="color-dot" style="background:var(--green)"></div><div class="bar-label">Verde</div><div class="bar-track"><div class="bar-fill verde" style="width:${Math.round(v/total*100)}%"></div></div><div class="count">${v}</div></div>
        <div class="bar-row"><div class="color-dot" style="background:var(--yellow)"></div><div class="bar-label">Amarillo</div><div class="bar-track"><div class="bar-fill amarillo" style="width:${Math.round(a/total*100)}%"></div></div><div class="count">${a}</div></div>
        <div class="bar-row"><div class="color-dot" style="background:var(--red)"></div><div class="bar-label">Rojo</div><div class="bar-track"><div class="bar-fill rojo" style="width:${Math.round(r/total*100)}%"></div></div><div class="count">${r}</div></div>
      </div>
    `;
  });
  html += `</div>`;
  panel.innerHTML = html;
}

window.clearData = () => {
  if (confirm("¿Borrar todas las respuestas? Hacé esto solo antes de una nueva sesión.")) {
    set(ref(db, "t3_respuestas"), null);
  }
};
</script>
</body>
</html>
